kind = "web"
previewPath = "/"
title = "Unmoggle"
version = "1.0.0"
id = "artifacts/omoggle-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18799

[services.development]
run = "pnpm --filter @workspace/omoggle-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omoggle-clone", "run", "build" ]
publicDir = "artifacts/omoggle-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18799"
BASE_PATH = "/"
